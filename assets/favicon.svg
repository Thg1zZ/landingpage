<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#0a0c10"/>
  <!-- Border accent -->
  <rect width="32" height="32" rx="6" fill="none" stroke="#4a9eff" stroke-width="1.5" opacity="0.6"/>
  <!-- Letter T in IBM Plex Mono style -->
  <text
    x="16"
    y="23"
    text-anchor="middle"
    font-family="'IBM Plex Mono', 'Courier New', monospace"
    font-weight="600"
    font-size="20"
    fill="#4a9eff"
    letter-spacing="-0.5"
  >T</text>
  <!-- Subtle glow line at top -->
  <line x1="8" y1="1.5" x2="24" y2="1.5" stroke="#4a9eff" stroke-width="1" opacity="0.4"/>
</svg>
